filters:
  - filter_type: file
    # all supported i18n types: https://docs.transifex.com/formats
    file_format: Android
    source_language: en_US
    source_file: app/src/main/res/values/strings.xml
    # path expression to translation files, must contain <lang> placeholder
    translation_files_expression: app/src/main/res/values-<lang>/strings.xml
  - filter_type: file
    file_format: TXT
    source_language: en_US
    source_file: fastlane/metadata/android/en-US/title.txt
    translation_files_expression: fastlane/metadata/android/<lang>/title.txt
  - filter_type: file
    file_format: TXT
    source_language: en_US
    source_file: fastlane/metadata/android/en-US/short_description.txt
    translation_files_expression: fastlane/metadata/android/<lang>/short_description.txt
  - filter_type: file
    file_format: TXT
    source_language: en_US
    source_file: fastlane/metadata/android/en-US/full_description.txt
    translation_files_expression: fastlane/metadata/android/<lang>/full_description.txt
settings:
  language_mapping:
    sv_SE: sv
    pt_PT: pt-rPT
    ko_KR: ko-rKR
    hi_IN: hi-rIN
    fa_IR: fa-rIR
    ast_ES: ast-rES
    zh_CN: zh-rCN
    zh_TW: zh-rTW
    zh_HK: zh-rHK
    pt_BR: pt-rBR
    my_MM: my-rMM
    it_IT: it-rIT
    tr_TR: tr-rTR
    zh-Hans: zh-rHN
    ur_PK: ur-rPK
    cs_CZ: cs-rCZ
    es_ES: es-rES
    es_VE: es-rVE
    hu: hu-rHU
